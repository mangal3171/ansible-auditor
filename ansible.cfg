[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml
callbacks_enabled   = timer, profile_tasks
forks               = 10
# CentOS 7 defaults to Python 2; explicitly force Python 3
interpreter_python  = /usr/bin/python3
# Uncomment once ~/.vault_pass exists (chmod 600)
# vault_password_file = ~/.vault_pass

[privilege_escalation]
# become is set per-task, not globally
become        = False
become_method = sudo
become_ask_pass = False

[ssh_connection]
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=yes -o BatchMode=yes
pipelining      = True
transfer_method = smart
