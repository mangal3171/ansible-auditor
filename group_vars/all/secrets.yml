---
# =============================================================================
# group_vars/all/secrets.yml — Global secrets
# THIS FILE MUST BE ENCRYPTED: ansible-vault encrypt group_vars/all/secrets.yml
# NEVER commit the plaintext version to version control.
# =============================================================================

# sudo password for the ansible service account on target hosts
vault_ansible_become_pass: "CHANGE_ME_BEFORE_ENCRYPTING"

# Optional: GPG key ID for encrypting the report file at rest
# Leave empty string to skip GPG encryption
vault_report_encryption_key: ""
